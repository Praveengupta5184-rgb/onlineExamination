{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit Course Content</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <h1>Edit Content for {{ object.title }}</h1>
    </header>

    <section class="panel">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
          <label>Content</label>
          <textarea name="content" class="form-control" rows="6">{{ object.content }}</textarea>
        </div>
        <div class="form-group">
          <label>Upload PDF</label>
          <input type="file" name="pdf" class="form-control">
          {% if object.pdf %}
            <p>Current file: <a href="{{ object.pdf.url }}">Download</a></p>
          {% endif %}
        </div>
        <div style="margin-top:12px;">
          <button class="btn btn-primary" type="submit">Save</button>
          <a href="{% url 'courses' %}" class="btn">Cancel</a>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
